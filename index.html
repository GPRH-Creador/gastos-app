<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>💰 Gastos Familiares 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
    <style>
        :root {
            --bg: #0f1117; --card: #1a1d27; --input: #22263a; --border: #2e334d;
            --accent: #4f8ef7; --text: #ffffff; --text-dim: #94a3b8; --red: #ef4444; --green: #22c55e;
        }
        * { box-sizing: border-box; font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
        
        #login-view, #app-view { display: none; flex-direction: column; width: 100%; }
        .show { display: flex !important; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { font-size: 1.5rem; margin-bottom: 8px; text-align: center; font-weight: 700; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select {
            width: 100%; background: var(--input); border: 1px solid var(--border);
            padding: 14px; border-radius: 12px; color: white; font-size: 16px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); background: var(--border); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.8; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .status { font-size: 12px; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; color: var(--text-dim); background: var(--card); padding: 8px 16px; border-radius: 20px; align-self: center; border: 1px solid var(--border); }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .dot.err { background: var(--red); box-shadow: 0 0 8px var(--red); }
        .dot.load { background: var(--accent); animation: pulse 1s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2e334d; padding: 12px 24px; border-radius: 50px; font-size: 14px; opacity: 0; transition: 0.3s; z-index: 1000; pointer-events: none; }
        .toast.show { opacity: 1; bottom: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-view">
        <div style="font-size: 4rem; text-align: center; margin-top: 15vh;">💰</div>
        <h1>Mis Gastos 2026</h1>
        <p style="text-align: center; color: var(--text-dim); margin-bottom: 2rem;">Acceso a Gestión Financiera</p>
        <button class="btn btn-primary" onclick="login()">Entrar con Microsoft</button>
        <p id="error-msg" style="color: var(--red); font-size: 12px; text-align: center; margin-top: 20px;"></p>
    </div>

    <div id="app-view">
        <div class="status">
            <div id="status-dot" class="dot err"></div>
            <span id="status-text">Iniciando...</span>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Monto ($)</label>
                <input type="number" id="f-valor" placeholder="Ej: 15000" inputmode="numeric">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" id="f-fecha">
                </div>
                <div class="form-group">
                    <label>Gasto / Item</label>
                    <select id="f-gasto">
                        </select>
                </div>
            </div>

            <div class="form-group">
                <label>Detalle</label>
                <input type="text" id="f-detalle" placeholder="¿En qué se gastó?">
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Medio</label>
                    <select id="f-medio">
                        <option value="Transferencia">Transferencia</option>
                        <option value="Débito">Débito</option>
                        <option value="Crédito">Crédito</option>
                        <option value="Efectivo">Efectivo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Cuenta</label>
                    <select id="f-cuenta">
                        <option value="Cta_Cte_BancoEstado">Cta Cte Bco Estado</option>
                        <option value="Mastercard Tenpo">Mastercard Tenpo</option>
                        <option value="Mastercard Falabella">Masc. Falabella</option>
                        <option value="Cta_Rut_BancoEstado">Cta Rut</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>N° Transacción (Opcional)</label>
                <input type="text" id="f-trans" placeholder="Ej: 123456">
            </div>

            <button id="btn-save" class="btn btn-primary" onclick="guardar()">Guardar en Excel</button>
            <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:25px; font-size:12px; text-decoration:underline; cursor:pointer;">Cerrar Sesión</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
// USANDO TUS CONSTANTES ORIGINALES
const CLIENT_ID  = '295e1bdd-225b-49d3-a0d2-aa08bdf211e3';
const FILE_NAME  = 'Control_de_Gastos_2026.xlsx';
const SHEET_DATA = 'Registros';
const SHEET_LISTAS = 'Listas';
const SCOPES     = ['Files.ReadWrite', 'User.Read'];

const MSAL = new msal.PublicClientApplication({
    auth: {
        clientId: CLIENT_ID,
        authority: "https://login.microsoftonline.com/common",
        redirectUri: window.location.origin + window.location.pathname
    },
    cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
});

let user = null;
let fileId = null;
let gastosCache = [];

async function init() {
    try {
        const resp = await MSAL.handleRedirectPromise();
        user = resp ? resp.account : MSAL.getAllAccounts()[0];

        if (user) {
            document.getElementById('app-view').classList.add('show');
            document.getElementById('f-fecha').valueAsDate = new Date();
            conectar();
        } else {
            document.getElementById('login-view').classList.add('show');
        }
    } catch (e) {
        document.getElementById('error-msg').textContent = "Error de Auth: " + e.message;
    }
}

async function login() { await MSAL.loginRedirect({ scopes: SCOPES }); }
async function logout() { localStorage.clear(); MSAL.logoutRedirect(); }

async function getToken() {
    const req = { scopes: SCOPES, account: user };
    try { return (await MSAL.acquireTokenSilent(req)).accessToken; }
    catch (e) { return (await MSAL.acquireTokenPopup(req)).accessToken; }
}

async function conectar() {
    try {
        setStatus('load', 'Sincronizando...');
        const token = await getToken();
        // Buscamos el archivo en todo el Drive
        const res = await fetch(`https://graph.microsoft.com/v1.0/me/drive/root/search(q='${FILE_NAME}')`, {
            headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.value && data.value.length > 0) {
            fileId = data.value[0].id;
            await cargarListas(token);
            setStatus('ok', 'Excel Conectado');
        } else { throw new Error("Archivo no encontrado"); }
    } catch (e) { setStatus('err', 'Error de conexión'); }
}

async function cargarListas(token) {
    try {
        // Obtenemos los gastos de la columna G de la hoja Listas (según tu Excel)
        const res = await fetch(`https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/workbook/worksheets('${SHEET_LISTAS}')/range(address='G2:H100')`, {
            headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        const sel = document.getElementById('f-gasto');
        sel.innerHTML = "";
        
        if(data.values) {
            gastosCache = data.values.filter(r => r[0]);
            gastosCache.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r[0]; opt.textContent = r[0];
                sel.appendChild(opt);
            });
        }
    } catch(e) { console.warn("No se pudieron cargar las listas"); }
}

async function guardar() {
    const val = document.getElementById('f-valor').value;
    const fec = document.getElementById('f-fecha').value;
    const det = document.getElementById('f-detalle').value;
    const gst = document.getElementById('f-gasto').value;

    if (!val || !fec || !det) return showToast("Faltan datos", true);

    const btn = document.getElementById('btn-save');
    btn.disabled = true; btn.textContent = "Procesando...";

    const d = new Date(fec + 'T12:00:00');
    const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    
    // Buscar la familia en el cache de listas
    const infoGasto = gastosCache.find(r => r[0] === gst);
    const familia = infoGasto ? infoGasto[1] : "Otros";
    const tipo = (familia === "Ingreso") ? "Ingreso" : "Egreso";

    // MAPEADO EXACTO A 14 COLUMNAS (A-N)
    const row = [
        meses[d.getMonth()],            // A: Mes
        d.getFullYear(),                 // B: Año
        fec,                             // C: Fecha Pago
        dias[d.getDay()],                // D: Día
        getWk(d),                        // E: Semana
        det,                             // F: Detalle
        document.getElementById('f-trans').value || "", // G: N° Transacción
        gst,                             // H: Gasto *
        familia,                         // I: Familia
        tipo,                            // J: Tipo
        parseFloat(val),                 // K: $ Valor
        document.getElementById('f-medio').value, // L: Medio Pago
        document.getElementById('f-cuenta').value, // M: Cuenta
        ""                               // N: Notas
    ];

    try {
        const token = await getToken();
        // Insertamos en la tabla TRegistros (debe existir en tu hoja Registros)
        const url = `https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/workbook/worksheets('${SHEET_DATA}')/tables('TRegistros')/rows`;
        
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ values: [row] })
        });

        if (res.ok) {
            showToast("✓ Registrado con éxito");
            document.getElementById('f-valor').value = "";
            document.getElementById('f-detalle').value = "";
            document.getElementById('f-trans').value = "";
        } else { throw new Error(); }
    } catch (e) {
        showToast("Error al guardar", true);
    } finally {
        btn.disabled = false; btn.textContent = "Guardar en Excel";
    }
}

function getWk(d) {
    const target = new Date(d.valueOf());
    const dayNr = (d.getDay() + 6) % 7;
    target.setDate(target.getDate() - dayNr + 3);
    const firstThursday = target.valueOf();
    target.setMonth(0, 1);
    if (target.getDay() !== 4) target.setMonth(0, 1 + ((4 - target.getDay() + 7) % 7));
    return 1 + Math.ceil((firstThursday - target) / 604800000);
}

function setStatus(cl, txt) {
    document.getElementById('status-dot').className = 'dot ' + cl;
    document.getElementById('status-text').textContent = txt;
}

function showToast(m, err = false) {
    const t = document.getElementById('toast');
    t.textContent = m; t.style.background = err ? 'var(--red)' : 'var(--surface2)';
    t.style.border = err ? '1px solid var(--red)' : '1px solid var(--accent)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
