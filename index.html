<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>💰 Gastos Familiares 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e334d;
  --accent:#4f8ef7;--accent2:#7c5cfc;--green:#22c55e;--red:#ef4444;
  --text:#ffffff;--text-dim:#94a3b8;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:14px;
}
.app-container{max-width:500px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column;}

/* Login View */
#login-view{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.logo-icon{font-size:4rem;margin-bottom:1rem;filter:drop-shadow(0 0 20px rgba(79,142,247,0.3));}
.btn-login{
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  color:white;border:none;padding:16px 32px;border-radius:12px;
  font-weight:600;font-size:1rem;cursor:pointer;width:100%;max-width:280px;
}

/* Header */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.user-pill{background:var(--surface2);padding:6px 12px;border-radius:20px;display:flex;align-items:center;gap:8px;font-size:12px;}
.avatar{width:24px;height:24px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;}

/* Form */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;color:var(--text-dim);font-size:12px;margin-bottom:6px;font-weight:500;}
input, select{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  padding:12px;border-radius:10px;color:white;font-size:15px;outline:none;
}
input:focus{border-color:var(--accent);}

.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.btn-save{
  width:100%;padding:16px;border-radius:12px;border:none;font-weight:700;
  font-size:1rem;cursor:pointer;background:var(--accent);color:white;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-save:disabled{opacity:0.6;cursor:not-allowed;}

/* Sync Status */
.status-bar{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:12px;color:var(--text-dim);}
.sdot{width:8px;height:8px;border-radius:50%;}
.sdot.ok{background:var(--green);box-shadow:0 0 8px var(--green);}
.sdot.ld{background:var(--accent);animation:pulse 1s infinite;}
.sdot.err{background:var(--red);}

@keyframes pulse{0%{opacity:0.4;}50%{opacity:1;}100%{opacity:0.4;}}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#333;padding:12px 24px;border-radius:30px;font-weight:500;
  opacity:0;transition:0.3s;pointer-events:none;z-index:1000;
}
.toast.show{opacity:1;bottom:30px;}
.toast.er{background:var(--red);}
</style>
</head>
<body>

<div id="login-view">
  <div class="logo-icon">💰</div>
  <h1>Mis Gastos 2026</h1>
  <p style="color:var(--text-dim); margin-bottom:2rem;">Accede con tu cuenta de Microsoft</p>
  <button class="btn-login" onclick="login()">Iniciar Sesión</button>
  <div id="login-err" style="color:var(--red); font-size:12px; margin-top:20px;"></div>
</div>

<div id="app-view" class="app-container" style="display:none;">
  <div class="header">
    <div class="user-pill">
      <div class="avatar" id="u-initial">?</div>
      <span id="u-name">Usuario</span>
    </div>
    <button onclick="logout()" style="background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;">Cerrar</button>
  </div>

  <div class="status-bar">
    <div id="sdot" class="sdot err"></div>
    <span id="slbl">Sin conexión a Excel</span>
  </div>

  <div class="card">
    <div class="form-group">
      <label>VALOR ($)</label>
      <input type="number" id="f-v" placeholder="0" inputmode="numeric">
    </div>

    <div class="row-2">
      <div class="form-group">
        <label>FECHA PAGO</label>
        <input type="date" id="f-f">
      </div>
      <div class="form-group">
        <label>TIPO GASTO</label>
        <select id="f-g">
          <option value="">Selecciona...</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>DETALLE / DESCRIPCIÓN</label>
      <input type="text" id="f-d" placeholder="Ej: Compra supermercado">
    </div>

    <div class="row-2">
      <div class="form-group">
        <label>MEDIO PAGO</label>
        <select id="f-m">
          <option value="Transferencia">Transferencia</option>
          <option value="Débito">Débito</option>
          <option value="Crédito">Crédito</option>
          <option value="Efectivo">Efectivo</option>
        </select>
      </div>
      <div class="form-group">
        <label>CUENTA</label>
        <select id="f-c">
          <option value="Cta_Cte_BancoEstado">Cta Cte BancoEstado</option>
          <option value="Mastercard Tenpo">Mastercard Tenpo</option>
          <option value="Mastercard Falabella">Mastercard Falabella</option>
          <option value="Cta_Rut_BancoEstado">Cta Rut</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>N° TRANSACCIÓN (OPCIONAL)</label>
      <input type="text" id="f-t" placeholder="Ej: 4208923">
    </div>

    <button id="bsave" class="btn-save" onclick="guardar()">Guardar en Excel</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// CONFIGURACIÓN MSAL (No cambiar ClientID ni RedirectURI si ya están en Azure)
const msalConfig = {
  auth: {
    clientId: "07e47858-6932-4f3b-8217-11116260a927",
    authority: "https://login.microsoftonline.com/common",
    redirectUri: "https://gprh-creador.github.io/gastos-app/"
  },
  cache: { cacheLocation: "localStorage", storeAuthStateInCookie: true }
};

const MSAL = new msal.PublicClientApplication(msalConfig);
const SCOPES = ["Files.ReadWrite.All", "User.Read"];
const FILE_NAME = "Control_de_Gastos_2026.xlsx";
const SHEET_REGISTROS = "Registros"; // Tu pestaña de Excel

let currentUser = null;
let fileId = null;

// Mapeo inicial de categorías (Se puede cargar desde 'Listas')
const gastosMap = {
  "Saesa": "Gastos Comunes", "Essal": "Gastos Comunes", "Lipigas": "Gastos Comunes",
  "Supermercado": "Alimentos", "Combustible": "Transporte", "Sueldo": "Ingreso"
};

async function init(){
  try {
    const res = await MSAL.handleRedirectPromise();
    if(res) currentUser = res.account;
    else {
      const accounts = MSAL.getAllAccounts();
      if(accounts.length > 0) currentUser = accounts[0];
    }

    if(currentUser) showApp();
  } catch(e) {
    document.getElementById('login-err').textContent = "Error: " + e.message;
  }
}

function showApp(){
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('app-view').style.display = 'flex';
  document.getElementById('u-name').textContent = currentUser.name.split(' ')[0];
  document.getElementById('u-initial').textContent = currentUser.name[0];
  document.getElementById('f-f').valueAsDate = new Date();
  llenarCategorias();
  conectarExcel();
}

function llenarCategorias(){
  const sel = document.getElementById('f-g');
  // Puedes añadir más aquí o cargarlas dinámicamente
  const cats = ["Luz","Agua","Gas Medidor","Gas Cilindro","Supermercado","Combustible","Arriendo","Remuneracion","Retiro SoyFocus","Gastos Dania"];
  cats.sort().forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
}

async function login(){
  await MSAL.loginRedirect({ scopes: SCOPES });
}

function logout(){
  localStorage.clear();
  MSAL.logoutRedirect();
}

async function getToken(){
  try {
    const res = await MSAL.acquireTokenSilent({ scopes: SCOPES, account: currentUser });
    return res.accessToken;
  } catch(e) {
    await MSAL.loginRedirect({ scopes: SCOPES });
  }
}

async function conectarExcel(){
  try {
    sync('ld','Buscando archivo...');
    const token = await getToken();
    const res = await fetch(`https://graph.microsoft.com/v1.0/me/drive/root/search(q='${FILE_NAME}')`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    if(data.value && data.value.length > 0){
      fileId = data.value[0].id;
      sync('ok','Excel Conectado');
    } else {
      throw new Error("No se encontró el archivo");
    }
  } catch(e) {
    sync('err','Error de conexión');
  }
}

async function guardar(){
  const v = parseFloat(document.getElementById('f-v').value);
  const f = document.getElementById('f-f').value; 
  const d = document.getElementById('f-d').value.trim();
  const g = document.getElementById('f-g').value;
  const m = document.getElementById('f-m').value;
  const c = document.getElementById('f-c').value;
  const t = document.getElementById('f-t').value.trim();

  if(!v || !f || !d || !g) {
    toast("Faltan datos obligatorios", "er");
    return;
  }

  const btn = document.getElementById('bsave');
  btn.disabled = true;
  btn.textContent = "Enviando...";

  const dt = new Date(f + 'T12:00:00');
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

  // Lógica de Familia y Tipo (Según tu archivo Listas)
  const familia = gastosMap[g] || "Varios";
  const tipo = (g.includes("Remuneracion") || g.includes("Ingreso") || g.includes("Retiro")) ? "Ingreso" : "Egreso";

  // ARRAY DE 14 COLUMNAS (Exacto al Excel 2026)
  // A:Mes | B:Año | C:Fecha Pago | D:Día | E:Semana | F:Detalle | G:N° Trans | H:Gasto | I:Familia | J:Tipo | K:Valor | L:Medio | M:Cuenta | N:Notas
  const row = [
    meses[dt.getMonth()], // A
    dt.getFullYear(),      // B
    f,                     // C
    dias[dt.getDay()],     // D
    getWk(dt),             // E
    d,                     // F
    t,                     // G
    g,                     // H
    familia,               // I
    tipo,                  // J
    v,                     // K
    m,                     // L
    c,                     // M
    ""                     // N
  ];

  try {
    const token = await getToken();
    // Intentamos guardar en la tabla "TRegistros" o en el rango final
    const url = `https://graph.microsoft.com/v1.0/me/drive/items/${fileId}/workbook/worksheets/${SHEET_REGISTROS}/tables/TRegistros/rows`;
    
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [row] })
    });

    if(res.ok){
      toast("✓ Guardado con éxito");
      document.getElementById('f-v').value = "";
      document.getElementById('f-d').value = "";
      document.getElementById('f-t').value = "";
    } else {
      throw new Error("Fallo al escribir en Excel");
    }
  } catch(e) {
    console.error(e);
    toast("Error al guardar en OneDrive", "er");
  } finally {
    btn.disabled = false;
    btn.textContent = "Guardar en Excel";
  }
}

// Utils
function getWk(d) {
  const date = new Date(d.getTime());
  date.setHours(0, 0, 0, 0);
  date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
  const week1 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function sync(st,lbl){
  document.getElementById('sdot').className = 'sdot ' + st;
  document.getElementById('slbl').textContent = lbl;
}

function toast(msg,type='ok'){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(()=> t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
